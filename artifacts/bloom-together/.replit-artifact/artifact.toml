kind = "web"
previewPath = "/"
title = "Bloom Together"
version = "1.0.0"
id = "artifacts/bloom-together"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26067

[services.development]
run = "pnpm --filter @workspace/bloom-together run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloom-together", "run", "build" ]
publicDir = "artifacts/bloom-together/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26067"
BASE_PATH = "/"
